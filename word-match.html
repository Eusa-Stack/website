<!DOCTYPE html>
<html lang="en">
<head>
<script src="theme-manager.js"></script>
<link rel="stylesheet" href="theme.css">
<link rel="stylesheet" href="navbar.css">

<link rel="stylesheet" href="grammar-shared.css"><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Match Jr — EduSuite Games</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>

*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);}
.hero{text-align:center;padding:1.5rem 1.5rem .3rem}
.hero h1{font-family:'Fredoka',sans-serif;font-size:clamp(24px,5vw,34px);font-weight:700}
.hero p{color:var(--sft);font-size:14px;font-weight:600}
.stats{display:flex;justify-content:center;gap:16px;flex-wrap:wrap;margin-bottom:.8rem}
.stat{background:var(--wht);border-radius:14px;padding:10px 20px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.03)}
.snum{font-family:'Fredoka',sans-serif;font-size:22px;font-weight:700;color:var(--org)}
.slbl{font-size:10px;color:var(--sft);font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.game-wrap{max-width:650px;margin:0 auto;padding:0 1rem 2rem;text-align:center}

/* Noun lesson banner */
.noun-banner{background:linear-gradient(90deg,var(--yel),var(--org));border-radius:16px;padding:10px 16px;margin-bottom:1rem;font-family:'Fredoka',sans-serif;font-size:14px;font-weight:700;color:var(--txt)}

/* Category tabs */
.cat-tabs{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;margin-bottom:.8rem}
.ct{padding:9px 18px;border-radius:12px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;border:3px solid #E0D6CC;cursor:pointer;background:var(--wht);transition:.15s}
.ct:hover{border-color:var(--ppl);transform:translateY(-2px)}
.ct.act{background:var(--ppl);color:#fff;border-color:var(--ppl);box-shadow:0 4px 14px rgba(167,139,250,.35)}

/* Audio toggle */
.audio-row{display:flex;gap:8px;align-items:center;justify-content:center;margin-bottom:.6rem}
.audio-btn{background:var(--wht);border:3px solid #E0D6CC;border-radius:12px;padding:6px 14px;cursor:pointer;font-size:13px;font-weight:700;color:var(--sft);transition:.15s;display:inline-flex;align-items:center;gap:6px}
.audio-btn:hover{border-color:var(--grn);color:var(--grn)}
.audio-btn.on{background:#DCFCE7;border-color:var(--grn);color:var(--grn)}

/* Word card */
.word-card{background:var(--wht);border-radius:20px;border:3px solid #E0D6CC;padding:1.5rem 1rem;margin-bottom:1.2rem;position:relative}
.word-row{display:flex;align-items:center;justify-content:center;gap:14px}
.word-text{font-family:'Fredoka',sans-serif;font-size:clamp(28px,5vw,42px);font-weight:700;color:var(--ppl)}
.speaker-btn{background:#F5F0FF;border:3px solid var(--ppl);border-radius:50%;width:48px;height:48px;font-size:22px;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center}
.speaker-btn:hover{background:var(--ppl);color:#fff;transform:scale(1.1)}
.speaker-btn:active{transform:scale(.92)}
.speaker-btn.speaking{background:var(--grn);border-color:var(--grn);color:#fff;animation:pulse .6s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}

/* Noun label */
.noun-label{display:inline-block;background:var(--yel);border-radius:8px;padding:2px 12px;font-size:11px;font-weight:700;color:var(--txt);margin-top:4px}

/* Picture grid */
.pics{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;max-width:400px;margin:0 auto}
.pic{background:var(--wht);border:3px solid #E0D6CC;border-radius:18px;padding:1.5rem .5rem;cursor:pointer;transition:.15s}
.pic:hover{border-color:var(--ppl);transform:scale(1.03);box-shadow:0 4px 14px rgba(167,139,250,.12)}
.pic.correct{background:#DCFCE7!important;border-color:var(--grn)!important}
.pic.wrong{background:#FEE2E2!important;border-color:var(--pnk)!important;animation:sh .3s}
@keyframes sh{0%,100%{opacity:1}50%{opacity:.5}}
.pic:disabled{cursor:default;opacity:.5;transform:none}
.pic-emoji{font-size:54px;display:block}
.pic-label{font-size:11px;color:var(--sft);font-weight:600;margin-top:4px;display:block}

.brow{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:1rem}
.btn{padding:12px 24px;border-radius:14px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;border:none;cursor:pointer;transition:.2s;text-decoration:none}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,.1)}
.btn-org{background:var(--org);color:#fff}.btn-wht{background:var(--wht);color:var(--txt);border:2px solid #E0D6CC}
.msg{font-size:16px;font-weight:700;min-height:2.5rem;padding:.5rem}

@media(max-width:450px){
  .word-row{flex-wrap:wrap}
  .pic{min-height:120px}
  .cat-tabs{gap:4px}
  .ct{font-size:11px;padding:7px 10px}
}

/* bigger font override */
body { font-size: 18px !important; line-height: 1.65 !important; }
.quiz-q, .fillin-q, .speak-q, .match-title { font-size: 18px !important; }
.sect-title, .g-sect-title { font-size: 19px !important; }
.quiz-opt, .fillin-opt, .match-word, .tb-stat { font-size: 15px !important; }



/* tech-ant — bigger fonts for readability */
body { font-size: 18px !important; line-height: 1.65 !important; }
h1 { font-size: 36px !important; }
h2 { font-size: 28px !important; }
h3 { font-size: 21px !important; }
.quiz-q, .fillin-q, .speak-q, .match-title { font-size: 18px !important; }
.sect-title { font-size: 19px !important; }
.quiz-opt, .fillin-opt, .match-word, .tb-stat { font-size: 15px !important; }
</style>
</head>
<body>

<!-- GLOBAL NAVBAR -->
<nav class="global-nav">
  <a href="index.html" class="nav-brand">
    <span class="nav-brand-e">Edu</span><span class="nav-brand-d">Suite</span><span class="nav-brand-dot">.</span>
  </a>
  <div class="nav-links">
    <a href="index.html" class="nav-link">🏠 Home</a>
    <a href="classroom.html" class="nav-link">🎓 Classroom</a>
  </div>
  <div class="nav-right">
    <button class="nav-theme-btn theme-toggle" onclick="EusaTheme.toggle()">☾ / ☀</button>
  </div>
</nav>

<header class="hero">
<h1>💬 Word Match Jr</h1><p>A noun is a name of a <b>person</b>, <b>animal</b>, <b>idea</b>, or <b>object</b>!</p></header>

<div class="cat-tabs">
  <button class="ct act" onclick="pickCat(0)">👥 People</button>
  <button class="ct" onclick="pickCat(1)">🐾 Animals</button>
  <button class="ct" onclick="pickCat(2)">💡 Ideas</button>
  <button class="ct" onclick="pickCat(3)">📦 Objects</button>
</div>

<div class="audio-row">
  <button class="audio-btn on" id="autoAudioBtn" onclick="toggleAutoAudio()">🔊 Auto-read</button>
  <span style="font-size:12px;color:var(--sft);font-weight:600">Words read aloud automatically</span>
</div>

<div class="stats">
  <div class="stat"><div class="snum" id="qnum">0/10</div><div class="slbl">Done</div></div>
  <div class="stat"><div class="snum" id="scr">0</div><div class="slbl">Score</div></div>
  <div class="stat"><div class="snum" id="strk">0</div><div class="slbl">Streak</div></div>
</div>

<div class="game-wrap">
  <div class="noun-banner" id="nounTip">📖 A <b>noun</b> is a name of a <b>person</b>, <b>animal</b>, <b>idea</b>, or <b>object</b></div>
  
  <div class="word-card">
    <div class="word-row">
      <span class="word-text" id="tgt">doctor</span>
      <button class="speaker-btn" id="speakerBtn" onclick="speakWord()" title="Listen">🔊</button>
    </div>
    <div class="noun-label" id="nounType">👥 People</div>
  </div>
  
  <div class="pics" id="pics"></div>
  <div class="msg" id="msg"></div>
  <div class="brow">
    <button class="btn btn-org" onclick="newRound()">🔄 Next Word</button>
    <a href="classroom.html" class="btn btn-wht">← Back</a>
  </div>
</div>

<script>
// ── NOUN CATEGORIES ──
// Tab 0: People  |  Tab 1: Animals  |  Tab 2: Ideas  |  Tab 3: Objects

const NOUN_TYPES=['👥 People','🐾 Animals','💡 Ideas','📦 Objects'];

const CATEGORIES=[
  // 0: PEOPLE — "a noun is a name of a person"
  [
    ['👨‍⚕️','doctor'],['👩‍⚕️','nurse'],['🚒','firefighter'],['👮','police'],['👩‍🏫','teacher'],
    ['👨‍🚀','astronaut'],['👨‍🍳','chef'],['👨‍✈️','pilot'],['👩‍🌾','farmer'],['🎨','artist'],
    ['🎵','musician'],['⚖️','judge'],['🧱','builder'],['🖌️','painter'],['💃','dancer'],
    ['🎤','singer'],['✍️','writer'],['👑','president'],['🔬','scientist'],['🦸','hero'],
    ['👨‍🔧','mechanic'],['👩‍🔬','chemist'],['👨‍🏗️','engineer'],['🎪','clown'],['🧑‍🚒','lifeguard']
  ],
  // 1: ANIMALS
  [
    ['🐶','dog'],['🐱','cat'],['🐰','rabbit'],['🐻','bear'],['🐸','frog'],
    ['🐴','horse'],['🐷','pig'],['🐔','chicken'],['🦊','fox'],['🐺','wolf'],
    ['🦁','lion'],['🐘','elephant'],['🐒','monkey'],['🐄','cow'],['🐑','sheep'],
    ['🦅','eagle'],['🐧','penguin'],['🦉','owl'],['🐍','snake'],['🐢','turtle'],
    ['🦈','shark'],['🐬','dolphin'],['🦋','butterfly'],['🐝','bee'],['🦀','crab']
  ],
  // 2: IDEAS — abstract nouns
  [
    ['❤️','love'],['🕊️','peace'],['😊','joy'],['🌟','hope'],['🦁','courage'],
    ['🔓','freedom'],['🤝','kindness'],['💎','honesty'],['💭','dream'],['🤗','friendship'],
    ['🦉','wisdom'],['🙏','faith'],['⚖️','justice'],['🔍','truth'],['🌸','beauty'],
    ['🙌','gratitude'],['⏳','patience'],['👏','respect'],['🤝','equality'],['💪','loyalty'],
    ['🎯','focus'],['🧠','intelligence'],['🌍','peace'],['🔥','passion'],['🌈','imagination']
  ],
  // 3: OBJECTS — fruits, vehicles, nature, objects
  [
    ['🍎','apple'],['🍌','banana'],['🍊','orange'],['🍇','grapes'],['🍓','strawberry'],
    ['🍉','watermelon'],['🥕','carrot'],['🍞','bread'],['🍕','pizza'],['🍪','cookie'],
    ['🚗','car'],['✈️','airplane'],['🚲','bicycle'],['🚢','ship'],['🚌','bus'],
    ['🚁','helicopter'],['🚜','tractor'],['🚀','rocket'],['🚂','train'],['🚓','police car'],
    ['🌸','flower'],['🌳','tree'],['🍄','mushroom'],['🌻','sunflower'],['🌵','cactus'],
    ['🌊','wave'],['🌙','moon'],['⭐','star'],['☀️','sun'],['🌈','rainbow'],
    ['⚽','ball'],['📚','book'],['🎵','music'],['🎨','paint'],['✏️','pencil'],
    ['💻','computer'],['🎂','cake'],['🧸','teddy'],['🎈','balloon'],['🔑','key']
  ]
];

const TAB_NOUN_TYPE = ['👥 a person', '🐾 an animal', '💡 an idea', '📦 an object'];

let game={cat:0,round:0,score:0,streak:0,correctEmoji:'',words:[],autoAudio:true,spoken:false};

function shuffle(a){for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function toggleAutoAudio(){
  game.autoAudio=!game.autoAudio;
  document.getElementById('autoAudioBtn').textContent=game.autoAudio?'🔊 Auto-read':'🔇 Manual';
  document.getElementById('autoAudioBtn').classList.toggle('on',game.autoAudio);
  if(game.autoAudio && document.getElementById('tgt').textContent){
    setTimeout(speakWord,300);
  }
}

function speakWord(){
  const word=document.getElementById('tgt').textContent;
  if(!word||!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(word);
  u.lang='en-US';u.rate=.8;u.pitch=1.1;
  const btn=document.getElementById('speakerBtn');
  btn.classList.add('speaking');
  u.onend=()=>btn.classList.remove('speaking');
  u.onerror=()=>btn.classList.remove('speaking');
  speechSynthesis.speak(u);
}

function pickCat(c){
  document.querySelectorAll('.ct').forEach((b,i)=>b.classList.toggle('act',i===c));
  game.cat=c;game.score=0;game.streak=0;game.round=0;
  game.words=shuffle([...CATEGORIES[c]]).slice(0,20);
  document.getElementById('nounTip').innerHTML=`📖 A <b>noun</b> is a name of <b>${TAB_NOUN_TYPE[c]}</b>`;
  newRound();
}

function newRound(){
  if(game.round>=10){endGame();return;}
  game.round++;game.spoken=false;
  const pool=[...game.words];
  const wordIdx=Math.floor(Math.random()*pool.length);
  game.correctEmoji=pool[wordIdx][0];const word=pool[wordIdx][1];
  const wrongs=pool.filter((_,i)=>i!==wordIdx).sort(()=>Math.random()-.5).slice(0,3);
  const choices=shuffle([pool[wordIdx],...wrongs]);
  document.getElementById('qnum').textContent=game.round+'/10';
  document.getElementById('scr').textContent=game.score;
  document.getElementById('strk').textContent=game.streak;
  document.getElementById('tgt').textContent=word;
  document.getElementById('nounType').textContent=NOUN_TYPES[game.cat];
  document.getElementById('msg').innerHTML='';
  document.getElementById('pics').innerHTML=choices.map(c=>`<button class="pic" onclick="picClick(this)"><span class="pic-emoji">${c[0]}</span><span class="pic-label">?</span></button>`).join('');
  
  // Auto-read if enabled
  if(game.autoAudio&&window.speechSynthesis){
    setTimeout(speakWord,400);
  }
}

function picClick(el){
  if(document.querySelector('.pic.correct')||document.querySelector('.pic.wrong'))return;
  document.querySelectorAll('.pic').forEach(b=>b.disabled=true);
  const emoji=el.querySelector('.pic-emoji').textContent;
  const correct=emoji===game.correctEmoji;
  
  // Show the word label underneath
  el.querySelector('.pic-label').textContent=document.getElementById('tgt').textContent;
  
  if(correct){
    el.classList.add('correct');game.score++;game.streak++;
    document.getElementById('msg').innerHTML='✅ Correct!'+(game.streak>2?' 🔥 '+game.streak+' streak!':'');
  }else{
    el.classList.add('wrong');game.streak=0;
    // Show correct answer
    document.querySelectorAll('.pic').forEach(b=>{
      if(b.querySelector('.pic-emoji').textContent===game.correctEmoji){
        b.querySelector('.pic-label').textContent=document.getElementById('tgt').textContent;
        b.classList.add('correct');
      }
    });
    document.getElementById('msg').innerHTML='❌ Try again next time!';
  }
  document.getElementById('scr').textContent=game.score;
  document.getElementById('strk').textContent=game.streak;
  setTimeout(newRound,1500);
}

function endGame(){
  const pct=Math.round(game.score/10*100),em=pct>=80?'🏆':pct>=50?'🌟':'💪';
  const title=pct>=80?'Noun Master!':pct>=50?'Good Learner!':'Keep Practicing!';
  document.querySelector('.word-card').innerHTML=`<div style="font-size:52px;margin-bottom:.3rem">${em}</div><div style="font-family:'Fredoka',sans-serif;font-size:28px;font-weight:700">${game.score}/10</div><div style="color:var(--sft);font-weight:600">${title}</div>`;
  document.getElementById('pics').innerHTML='';
  document.getElementById('nounTip').innerHTML='🎉 Great job learning <b>nouns</b>! Pick a new category to play again.';
}
pickCat(0);
</script>
<script src="floating-anim.js"></script>
</body>
</html>
