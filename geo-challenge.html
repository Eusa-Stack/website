<style>

*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);}
.hero{text-align:center;padding:1.5rem 1.5rem .3rem}
.hero h1{font-family:'Fredoka',sans-serif;font-size:clamp(24px,5vw,34px);font-weight:700}
.hero p{color:var(--sft);font-size:14px;font-weight:600}
.stats{display:flex;justify-content:center;gap:16px;margin-bottom:.5rem}
.stat{background:var(--wht);border-radius:14px;padding:10px 20px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.03)}
.snum{font-family:'Fredoka',sans-serif;font-size:22px;font-weight:700;color:var(--ppl)}
.slbl{font-size:10px;color:var(--sft);font-weight:700;text-transform:uppercase}
.game-wrap{max-width:750px;margin:0 auto;padding:0 1rem 2rem;text-align:center}
.q-area{background:var(--wht);border-radius:16px;padding:1rem 1.5rem;margin-bottom:.5rem;border:3px solid #E0D6CC}
.qt{font-family:'Fredoka',sans-serif;font-size:clamp(20px,4vw,30px);font-weight:700;margin-bottom:2px}
.qsub{font-size:13px;color:var(--sft);font-weight:600}
.map-wrap{border-radius:16px;overflow:hidden;border:3px solid #B3D9F2;margin-bottom:.5rem;background:#E8F4FD;position:relative}
.map-svg{width:100%;display:block}
.land{fill:#B3D9F2;stroke:#6BA3C7;stroke-width:1.2;cursor:pointer;transition:.2s}
.land:hover{fill:#94D3EC;stroke-width:2}
.land.correct{fill:#86EFAC!important;stroke:var(--grn)!important;stroke-width:2.5}
.land.wrong{fill:#FCA5A5!important;stroke:var(--pnk)!important;animation:sh .3s}
@keyframes sh{0%,100%{opacity:1}50%{opacity:.5}}
.land-label{fill:#4A7A9A;font-size:11px;font-family:'Nunito',sans-serif;font-weight:700;text-anchor:middle;pointer-events:none;text-shadow:0 0 6px rgba(255,255,255,.8)}
.ocean-label{fill:#8BB8D0;font-size:11px;font-family:'Nunito',sans-serif;font-weight:600;font-style:italic;text-anchor:middle;pointer-events:none}
.brow{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:.8rem}
.btn{padding:12px 24px;border-radius:14px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;border:none;cursor:pointer;transition:.2s;text-decoration:none}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,.1)}
.btn-org{background:var(--org);color:#fff}.btn-wht{background:var(--wht);color:var(--txt);border:2px solid #E0D6CC}
.msg{padding:.4rem;font-size:17px;font-weight:700;min-height:2.5rem;text-align:center}

/* bigger font override */
body { font-size: 18px !important; line-height: 1.65 !important; }
.quiz-q, .fillin-q, .speak-q, .match-title { font-size: 18px !important; }
.sect-title, .g-sect-title { font-size: 19px !important; }
.quiz-opt, .fillin-opt, .match-word, .tb-stat { font-size: 15px !important; }



/* EUSTAQUIA — bigger fonts for readability */
body { font-size: 18px !important; line-height: 1.65 !important; }
h1 { font-size: 36px !important; }
h2 { font-size: 28px !important; }
h3 { font-size: 21px !important; }
.quiz-q, .fillin-q, .speak-q, .match-title { font-size: 18px !important; }
.sect-title { font-size: 19px !important; }
.quiz-opt, .fillin-opt, .match-word, .tb-stat { font-size: 15px !important; }
</style>
</head>

<div class="msg" id="msg">Click the correct area on the map!</div>
<div class="brow"><button class="btn btn-org" onclick="newGame()">🔄 New Game</button><a href="classroom.html" class="btn btn-wht">← Back</a></div>
</div>

<script>
const QUESTIONS=[
// Continents
{q:'Where is North America?',ans:'na',hint:'Northern hemisphere, between Atlantic & Pacific'},
{q:'Where is South America?',ans:'sa',hint:'Tropical continent below North America'},
{q:'Where is Africa?',ans:'af',hint:'Home to the Sahara Desert'},
{q:'Where is Asia?',ans:'as',hint:'The largest continent'},
{q:'Where is Europe?',ans:'eu',hint:'Small continent west of Asia'},
{q:'Where is Australia?',ans:'au',hint:'The smallest continent, an island!'},
{q:'Where is Antarctica?',ans:'an',hint:'The frozen continent at the bottom'},
// Cities on map
{q:'The Amazon Rainforest is in...',ans:'sa',hint:'Lungs of the Earth'},
{q:'The Sahara Desert is in...',ans:'af',hint:'The largest hot desert'},
{q:'The Himalayan Mountains are in...',ans:'as',hint:'Mount Everest lives here!'},
{q:'The Rocky Mountains are in...',ans:'na',hint:'Stretching from Canada to the US'},
{q:'The Great Barrier Reef is near...',ans:'au',hint:'Coral paradise!'},
{q:'The Alps are in...',ans:'eu',hint:'Famous mountains with skiing'},
{q:'Tokyo is in...',ans:'as',hint:'Land of the rising sun'},
{q:'London is in...',ans:'eu',hint:'Home of Big Ben'},
// Landmarks
{q:'Madagascar island',ans:'mg',hint:'Off the east coast of Africa'},
{q:'Greenland — the icy island',ans:'gl',hint:'Largest island, north of Atlantic'},
{q:'Where is Japan?',ans:'jp',hint:'Island nation east of Asia'},
{q:'The United Kingdom (UK)',ans:'uk',hint:'Island nation west of Europe'},
{q:'New York City is in...',ans:'na',hint:'The Big Apple!'},
];
let game={qs:[],q:0,score:0,locked:false};
function shuffle(a){for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function newGame(){game.qs=shuffle([...QUESTIONS]).slice(0,15);game.q=0;game.score=0;game.locked=false;document.querySelectorAll('.land').forEach(c=>c.classList.remove('correct','wrong'));nextQ();}
function nextQ(){if(game.q>=15){endGame();return;}const q=game.qs[game.q];document.getElementById('qnum').textContent=(game.q+1)+'/15';document.getElementById('scr').textContent=game.score;document.getElementById('question').innerHTML='📍 '+q.q;document.getElementById('qsub').textContent=q.hint||'';document.getElementById('msg').innerHTML='';document.querySelectorAll('.land').forEach(c=>{c.classList.remove('correct','wrong');c.style.pointerEvents='auto';});game.locked=false;}
document.querySelectorAll('.land').forEach(c=>{c.addEventListener('click',function(){if(game.locked||!game.qs.length)return;game.locked=true;document.querySelectorAll('.land').forEach(x=>x.style.pointerEvents='none');const correct=this.id===game.qs[game.q].ans;this.classList.add(correct?'correct':'wrong');if(!correct){const r=document.getElementById(game.qs[game.q].ans);if(r)r.classList.add('correct');document.getElementById('msg').innerHTML='❌ That\'s not it! Correct area shown in green.';}else{game.score++;document.getElementById('scr').textContent=game.score;document.getElementById('msg').innerHTML='✅ Correct! Well done!';}game.q++;setTimeout(nextQ,1400);});});
function endGame(){const pct=Math.round(game.score/15*100),em=pct>=80?'🏆':pct>=50?'🌟':'💪';document.querySelector('.game-wrap').innerHTML=`<div style="text-align:center;padding:2rem"><div style="font-size:64px">${em}</div><div style="font-family:'Fredoka',sans-serif;font-size:32px;font-weight:700">${game.score}/15</div><div style="color:var(--sft);margin-bottom:1.5rem">Geography explorer!</div><div class="brow"><button class="btn btn-org" onclick="location.reload()">🔄 Play Again</button><a href="classroom.html" class="btn btn-wht">← Back</a></div></div>`;}
newGame();
</script>
